# =====================================================================
# Principles of Accounts MCQ topic map  --  Kerwin Springer bank -> POA objective_ids
# =====================================================================
# Resolution order in KerwinMCQAdapter._resolve:
#   1. subtopic_overrides[question.subtopic]  -> confidence HIGH
#   2. default_objective for the topic         -> confidence MEDIUM
#   3. unmapped_objective sentinel 'REVIEW'     -> confidence review
#
# Built from all 181 questions across 11 topics in the Kerwin Springer POA bank.
# Every target is a real objective_id in the locked 106-objective POA syllabus.
# Subtopics whose best objective equals the topic default are intentionally
# OMITTED (they fall through to the default at MEDIUM confidence).
# =====================================================================

