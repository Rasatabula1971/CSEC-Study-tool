# =====================================================================
# Economics MCQ topic map  --  Kerwin Springer bank -> ECON objective_ids
# =====================================================================
# Resolution order in KerwinMCQAdapter._resolve:
#   1. subtopic_overrides[question.subtopic]  -> confidence HIGH
#   2. default_objective for the topic         -> confidence MEDIUM
#   3. unmapped_objective sentinel 'REVIEW'     -> confidence review
#
# Built from all 91 (topic, subtopic) pairs in the live bank; every target is a
# real objective_id in the locked 77-objective Economics syllabus. Subtopics whose
# best objective equals the topic default are intentionally OMITTED (they fall
# through to the default at MEDIUM) per the curation review. Mapping decisions are
# human economics judgment, content-grounded against objectives.content_stmt and
# the CXC 36/G/SYLL 17 CONTENT detail.
# =====================================================================

