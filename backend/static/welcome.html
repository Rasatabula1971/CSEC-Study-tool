<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSEC Study Partner</title>
  <style>
    /* ============================================================
       Shared dark/blue palette — UI overhaul sessions 2 & 3 reuse
       these exact tokens so the redesign stays visually consistent.
       ============================================================ */
    :root {
      --bg-page: #13151a;
      --bg-card: rgba(255,255,255,0.04);
      --border-subtle: rgba(255,255,255,0.08);
      --border-card: rgba(255,255,255,0.1);
      --text-primary: #f0f1f4;
      --text-body: #eef2fb;
      --text-secondary: #c7cad1;
      --text-muted: #7d8290;
      --text-faint: #4a4d56;
      --accent-blue: #5b8def;
      --accent-blue-text: #0a0f1c;
      --accent-blue-soft-bg: rgba(91,141,239,0.1);
      --accent-blue-soft-border: rgba(91,141,239,0.25);
      --accent-green: #3ddc84;
      --accent-red: #e24b4a;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: var(--bg-page);
      color: var(--text-body);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    .page {
      max-width: 560px;
      margin: 0 auto;
      width: 100%;
      padding: 28px 22px 56px;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    /* --- Header row --- */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .brand {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-secondary);
      letter-spacing: 0.01em;
    }
    .subject-select {
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: 8px;
      color: var(--text-body);
      font-size: 14px;
      padding: 8px 12px;
      cursor: pointer;
      outline: none;
      max-width: 260px;
    }
    .subject-select:hover { border-color: var(--accent-blue-soft-border); }
    .subject-select:focus-visible { border-color: var(--accent-blue); box-shadow: 0 0 0 2px var(--accent-blue-soft-bg); }

    /* --- Quote block --- */
    .quote {
      text-align: center;
      padding-bottom: 26px;
      border-bottom: 1px solid var(--border-subtle);
    }
    .quote-text {
      font-style: italic;
      font-size: 18px;
      line-height: 1.55;
      color: var(--text-body);
      max-width: 460px;
      margin: 0 auto;
    }
    .quote-author {
      margin-top: 12px;
      font-size: 13px;
      color: var(--text-muted);
    }
    .quote-author::before { content: "— "; }

    /* --- Status row --- */
    .status {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .status-text { min-width: 0; }
    .status-subject {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .status-line {
      margin-top: 4px;
      font-size: 16px;
      color: var(--text-secondary);
      font-variant-numeric: tabular-nums;
    }
    .pct-badge {
      flex: none;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      background: var(--accent-blue-soft-bg);
      border: 1px solid var(--accent-blue-soft-border);
      color: var(--accent-blue);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    /* --- Action buttons --- */
    .actions { display: flex; flex-direction: column; gap: 10px; }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 14px 18px;
      border-radius: 11px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      border: 1px solid transparent;
      transition: opacity 120ms ease, background-color 120ms ease, border-color 120ms ease, transform 100ms ease;
    }
    .btn:active { transform: translateY(1px); }
    .btn:focus-visible { outline: 2px solid var(--accent-blue); outline-offset: 2px; }
    .btn-primary { background: var(--accent-blue); color: var(--accent-blue-text); }
    .btn-primary:hover { opacity: 0.92; }
    .btn-secondary {
      background: var(--bg-card);
      border-color: var(--border-card);
      color: var(--text-body);
    }
    .btn-secondary:hover { border-color: var(--accent-blue-soft-border); background: rgba(255,255,255,0.06); }

    /* --- Upload section --- */
    .upload-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 10px;
    }
    .dropzone {
      border: 1.5px dashed var(--border-card);
      border-radius: 12px;
      padding: 26px 18px;
      text-align: center;
      cursor: pointer;
      transition: border-color 120ms ease, background-color 120ms ease;
      background: rgba(255,255,255,0.015);
    }
    .dropzone:hover, .dropzone.dragover {
      border-color: var(--accent-blue);
      background: var(--accent-blue-soft-bg);
    }
    .dropzone:focus-visible { outline: 2px solid var(--accent-blue); outline-offset: 2px; }
    .dropzone-icon { color: var(--accent-blue); margin-bottom: 8px; }
    .dropzone-primary { font-size: 15px; color: var(--text-body); font-weight: 500; }
    .dropzone-secondary { margin-top: 4px; font-size: 13px; color: var(--text-muted); }
    .dropzone.busy { opacity: 0.6; pointer-events: none; }

    .upload-result {
      margin-top: 12px;
      font-size: 14px;
      padding: 12px 14px;
      border-radius: 10px;
      display: none;
      align-items: center;
      gap: 9px;
    }
    .upload-result.visible { display: flex; }
    .upload-result.success {
      background: rgba(61,220,132,0.1);
      border: 1px solid rgba(61,220,132,0.25);
      color: var(--accent-green);
    }
    .upload-result.review {
      background: rgba(245,180,80,0.1);
      border: 1px solid rgba(245,180,80,0.25);
      color: #f5b450;
    }
    .upload-result.error {
      background: rgba(226,75,74,0.1);
      border: 1px solid rgba(226,75,74,0.25);
      color: var(--accent-red);
    }
    .upload-result svg { flex: none; }

    /* --- Footer --- */
    .footer { text-align: center; margin-top: 8px; }
    .builder-link {
      font-size: 12px;
      color: var(--text-faint);
      background: none;
      border: none;
      cursor: pointer;
      text-decoration: none;
      padding: 4px 8px;
    }
    .builder-link:hover { color: var(--text-muted); }

    /* --- PIN modal --- */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 50;
    }
    .modal-overlay.visible { display: flex; }
    .modal {
      background: #1a1d24;
      border: 1px solid var(--border-card);
      border-radius: 14px;
      padding: 24px;
      width: 100%;
      max-width: 320px;
      text-align: center;
    }
    .modal-title { font-size: 15px; font-weight: 600; color: var(--text-body); margin-bottom: 14px; }
    .pin-input {
      width: 100%;
      background: var(--bg-page);
      border: 1px solid var(--border-card);
      border-radius: 8px;
      color: var(--text-body);
      font-size: 18px;
      letter-spacing: 0.3em;
      text-align: center;
      padding: 10px;
      outline: none;
    }
    .pin-input:focus-visible { border-color: var(--accent-blue); }
    .pin-error { min-height: 16px; margin-top: 8px; font-size: 12px; color: var(--accent-red); }
    .modal-actions { display: flex; gap: 10px; margin-top: 12px; }
    .modal-actions .btn { padding: 10px; font-size: 14px; }
  </style>
</head>
<body>
  <div class="page">

    <!-- Header -->
    <header class="header">
      <div class="brand">Study Partner</div>
      <select class="subject-select" id="subjectSelect" aria-label="Subject"></select>
    </header>

    <!-- Quote (single hardcoded quote for now). NOTE: per-visit quote ROTATION is a
         nice-to-have for a future session — intentionally NOT built here. -->
    <section class="quote">
      <p class="quote-text">Success is the sum of small efforts, repeated day in and day out.</p>
      <p class="quote-author">Robert Collier</p>
    </section>

    <!-- Status -->
    <section class="status">
      <div class="status-text">
        <div class="status-subject" id="statusSubject">…</div>
        <div class="status-line" id="statusLine">Loading your progress…</div>
      </div>
      <div class="pct-badge" id="pctBadge">—</div>
    </section>

    <!-- Actions -->
    <section class="actions">
      <a href="/plan" class="btn btn-primary">Continue studying →</a>
      <!-- Session 3 builds the objective-map view; this points at /plan for now and the
           anchor is wired once that view exists. -->
      <a href="/plan#topics" class="btn btn-secondary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        Browse all topics
      </a>
      <a href="/quiz" class="btn btn-secondary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        Practice with a past paper
      </a>
    </section>

    <!-- Upload -->
    <section class="upload">
      <div class="upload-label">Got new material?</div>
      <div class="dropzone" id="dropzone" tabindex="0" role="button"
           aria-label="Upload a worksheet, photo, or PDF">
        <div class="dropzone-icon">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        </div>
        <div class="dropzone-primary">Drop a worksheet, photo, or PDF</div>
        <div class="dropzone-secondary" id="dropzoneSub">I'll add it to your subject</div>
      </div>
      <input type="file" id="fileInput" accept=".pdf,.docx,.png,.jpg,.jpeg" style="display:none" />
      <div class="upload-result" id="uploadResult" role="status" aria-live="polite"></div>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <button type="button" class="builder-link" id="builderLink">Builder</button>
    </footer>
  </div>

  <!-- PIN modal -->
  <div class="modal-overlay" id="pinModal">
    <div class="modal">
      <div class="modal-title">Enter builder PIN</div>
      <input type="password" inputmode="numeric" class="pin-input" id="pinInput" maxlength="12" aria-label="Builder PIN" />
      <div class="pin-error" id="pinError"></div>
      <div class="modal-actions">
        <button type="button" class="btn btn-secondary" id="pinCancel">Cancel</button>
        <button type="button" class="btn btn-primary" id="pinSubmit">Enter</button>
      </div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const state = { subjects: [], current: null };

    function escapeHtml(s) {
      const d = document.createElement('div');
      d.textContent = s == null ? '' : String(s);
      return d.innerHTML;
    }
    function displayNameFor(id) {
      const s = state.subjects.find(x => x.subject_id === id);
      return s ? s.display_name : id;
    }

    /* ---- Subjects + sticky selection ---- */
    async function loadSubjects() {
      try {
        const res = await fetch('/api/subjects');
        if (res.ok) state.subjects = await res.json();
      } catch { state.subjects = []; }
      if (!Array.isArray(state.subjects)) state.subjects = [];

      let current = null;
      try {
        const r = await fetch('/api/state/subject');
        if (r.ok) current = (await r.json()).subject_id;
      } catch { /* fall back below */ }
      if (!current && state.subjects.length) current = state.subjects[0].subject_id;
      state.current = current;

      const sel = $('subjectSelect');
      sel.innerHTML = '';
      state.subjects.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s.subject_id;
        opt.textContent = s.display_name;
        if (s.subject_id === current) opt.selected = true;
        sel.appendChild(opt);
      });
    }

    async function onSubjectChange() {
      const sid = $('subjectSelect').value;
      state.current = sid;
      try {
        await fetch('/api/state/subject', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ subject_id: sid }),
        });
      } catch { /* keep going — the status reload still reflects the picked subject */ }
      loadStatus();   // reload just the status section, not the whole page
      updateDropzoneSub();
    }

    /* ---- Status row (reuses the same endpoints /plan uses) ---- */
    async function loadStatus() {
      const sid = state.current;
      $('statusSubject').textContent = displayNameFor(sid) || '';
      if (!sid) { $('statusLine').textContent = 'No subject set up yet.'; return; }

      let mastered = 0, total = 0, pct = 0, due = 0;
      try {
        const r = await fetch(`/api/plan/progress/${encodeURIComponent(sid)}`);
        if (r.ok) {
          const p = await r.json();
          mastered = p.mastered ?? 0; total = p.total ?? 0; pct = p.percent_mastered ?? 0;
        }
      } catch { /* leave zeros */ }
      try {
        const d = await fetch(`/api/due/${encodeURIComponent(sid)}`);
        if (d.ok) { const list = await d.json(); due = Array.isArray(list) ? list.length : 0; }
      } catch { /* leave zero */ }

      $('statusLine').textContent = `${mastered} of ${total} mastered · ${due} due today`;
      $('pctBadge').textContent = `${pct}%`;
    }

    function updateDropzoneSub() {
      const name = displayNameFor(state.current);
      $('dropzoneSub').textContent = name ? `I'll add it to ${name}` : "I'll add it to your subject";
    }

    /* ---- Student upload ---- */
    function showUploadResult(kind, text, icon) {
      const el = $('uploadResult');
      el.className = 'upload-result visible ' + kind;
      el.innerHTML = (icon || '') + '<span>' + escapeHtml(text) + '</span>';
    }
    const ICON_CHECK = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';

    async function uploadFile(file) {
      if (!file) return;
      const dz = $('dropzone');
      dz.classList.add('busy');
      showUploadResult('review', `Reading ${file.name}…`, '');
      try {
        const form = new FormData();
        if (state.current) form.append('subject_id', state.current);
        form.append('file', file);
        const res = await fetch('/api/student-upload', { method: 'POST', body: form });
        const data = await res.json().catch(() => ({ ok: false, outcome: 'error' }));

        if (data.ok && data.outcome === 'added') {
          showUploadResult('success', `Added to ${data.section || 'your notes'}`, ICON_CHECK);
          loadStatus();
        } else if (data.ok && data.outcome === 'needs_review') {
          showUploadResult('review', 'Got it — saved for review', '');
        } else {
          showUploadResult('error', data.message || 'Something went wrong — try again later.', '');
        }
      } catch {
        showUploadResult('error', 'Something went wrong — try again later.', '');
      } finally {
        dz.classList.remove('busy');
        $('fileInput').value = '';
      }
    }

    function wireDropzone() {
      const dz = $('dropzone'), input = $('fileInput');
      dz.addEventListener('click', () => input.click());
      dz.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); input.click(); }
      });
      input.addEventListener('change', () => uploadFile(input.files[0]));
      ['dragenter', 'dragover'].forEach(ev =>
        dz.addEventListener(ev, (e) => { e.preventDefault(); dz.classList.add('dragover'); }));
      ['dragleave', 'drop'].forEach(ev =>
        dz.addEventListener(ev, (e) => { e.preventDefault(); dz.classList.remove('dragover'); }));
      dz.addEventListener('drop', (e) => {
        const f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
        if (f) uploadFile(f);
      });
    }

    /* ---- Builder PIN gate ---- */
    let pinAttempts = 0;
    function openPin() {
      $('pinError').textContent = '';
      $('pinInput').value = '';
      $('pinModal').classList.add('visible');
      $('pinInput').focus();
    }
    function closePin() { $('pinModal').classList.remove('visible'); }
    async function submitPin() {
      const pin = $('pinInput').value.trim();
      if (!pin) return;
      try {
        const res = await fetch('/api/builder/verify-pin', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pin }),
        });
        const data = await res.json().catch(() => ({ ok: false }));
        if (data.ok) { closePin(); window.location.href = '/builder'; return; }
      } catch { /* treated as a wrong attempt below */ }
      pinAttempts += 1;
      if (pinAttempts >= 3) {
        closePin();   // three wrong tries: hide until a page refresh
      } else {
        $('pinError').textContent = 'Incorrect PIN.';
        $('pinInput').value = '';
        $('pinInput').focus();
      }
    }
    function wireBuilder() {
      $('builderLink').addEventListener('click', openPin);
      $('pinCancel').addEventListener('click', closePin);
      $('pinSubmit').addEventListener('click', submitPin);
      $('pinInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') submitPin(); });
      $('pinModal').addEventListener('click', (e) => { if (e.target === $('pinModal')) closePin(); });
    }

    /* ---- Init ---- */
    (async function init() {
      $('subjectSelect').addEventListener('change', onSubjectChange);
      wireDropzone();
      wireBuilder();
      await loadSubjects();
      updateDropzoneSub();
      loadStatus();
    })();
  </script>
</body>
</html>
