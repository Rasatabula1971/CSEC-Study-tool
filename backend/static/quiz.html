<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSEC Study Partner · Quiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Figtree:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/shared.css" />
  <style>
    /* ===== Quiz page: adopt the UI-overhaul blue palette by re-pointing the
       shared.css tokens (same approach as Study), so the question card, answer
       box and feedback match Study exactly. ===== */
    :root {
      --ink: var(--bg-page);
      --ink-2: #1a1d24;
      --ink-3: #21252e;
      --ink-4: #2a2f3a;
      --rule: var(--border-card);
      --rule-soft: var(--border-subtle);
      --booklet: var(--accent-blue);
      --booklet-bright: #7aa5f5;
      --booklet-dim: #34507e;
      --paper: var(--text-body);
      --paper-dim: var(--text-secondary);
      --paper-faint: var(--text-muted);
      --color-accent-glow: var(--accent-blue-soft-bg);
      --highlighter: var(--accent-blue);
      --highlighter-soft: var(--accent-blue-soft-bg);
    }
    html, body { height: 100%; overflow: hidden; }
    body { background: var(--bg-page); }
    .page { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    .topbar { display: flex; align-items: center; justify-content: space-between; gap: var(--space-4); padding: 14px 22px; border-bottom: 1px solid var(--border-subtle); }
    .topbar-back { display: inline-flex; align-items: center; gap: 6px; color: var(--text-muted); font-size: 14px; }
    .topbar-back:hover { color: var(--text-body); text-decoration: none; }
    .topbar-title { font-size: 15px; font-weight: 600; color: var(--text-secondary); }
    .topbar-right { display: flex; align-items: center; gap: 14px; }
    .topbar-link { color: var(--accent-blue); font-size: 14px; }

    /* Mode toggle — segmented control (Past Paper | Syllabus Practice) */
    .mode-toggle {
      display: inline-flex; gap: 0;
      background: var(--bg-card); border: 1px solid var(--border-card);
      border-radius: 10px; padding: 3px;
      margin: var(--space-4) auto 0; max-width: var(--content-max);
    }
    .mode-pill {
      padding: 7px 16px; border-radius: 7px; border: none; background: transparent;
      color: var(--text-muted); font-size: var(--text-sm); font-weight: 600;
      transition: background-color 120ms ease, color 120ms ease;
    }
    .mode-pill:hover { color: var(--text-body); }
    .mode-pill:focus-visible { outline: 2px solid var(--accent-blue); outline-offset: 2px; }
    .mode-pill.active { background: var(--accent-blue); color: var(--accent-blue-text); }

    /* Question card + answer box — identical to Study's */
    .content-area { flex: 1; overflow-y: auto; }
    .content-inner { max-width: 680px; margin: 0 auto; width: 100%; padding: 22px; display: flex; flex-direction: column; gap: 18px; }
    .section-label { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
    .question-card { background: var(--accent-blue-soft-bg); border: 1px solid var(--accent-blue-soft-border); border-radius: 12px; padding: 16px 18px; }
    .question-stem { font-size: 15px; line-height: 1.6; color: var(--text-body); }
    .question-card-header { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 10px; }
    .question-card-meta { display: flex; gap: 6px; flex-wrap: wrap; }
    .question-meta-tag { font-family: var(--font-mono); font-size: 11px; padding: 2px 7px; border-radius: 5px; background: rgba(255,255,255,0.06); color: var(--text-secondary); }
    .marks-badge { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
    .question-empty { text-align: center; padding: 20px; color: var(--text-muted); }
    .question-empty-icon { color: var(--text-faint); margin-bottom: 8px; display: flex; justify-content: center; }
    .question-empty-title { font-size: 14px; color: var(--text-secondary); }
    .question-empty-body { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
    .answer-textarea { width: 100%; min-height: 150px; background: var(--bg-page); border: 1px solid var(--border-card); border-radius: 12px; color: var(--text-body); padding: 12px 14px; resize: vertical; line-height: 1.6; outline: none; font-size: 14px; }
    .answer-textarea:focus { border-color: var(--accent-blue); }
    .answer-textarea:disabled { opacity: 0.5; }
    .submit-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-top: 10px; }
    .word-count { font-family: var(--font-mono); font-size: 12px; color: var(--text-faint); }
    .word-count.has-words { color: var(--text-muted); }
    .submit-btn { padding: 11px 22px; background: var(--accent-blue); color: var(--accent-blue-text); font-size: 14px; font-weight: 600; border-radius: 10px; cursor: pointer; border: none; }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .submit-btn-dots { display: none; }
    .grade-status-msg { font-family: var(--font-mono); font-size: 12px; color: var(--text-muted); }
    .grade-status-reassure { font-size: 12px; color: var(--text-faint); margin-top: 4px; }
    .error-notice { background: rgba(226,75,74,0.1); border: 1px solid rgba(226,75,74,0.25); color: var(--accent-red); border-radius: 10px; padding: 12px 14px; font-size: 14px; }

    .selector-row-top { grid-template-columns: 2fr 1fr; }
    .selector-row-bottom { grid-template-columns: 1fr auto; padding-top: 0; }
    .question-select-wrap { display: flex; flex-direction: column; gap: var(--space-1); flex: 1; }

    .load-btn {
      align-self: flex-end;
      padding: var(--space-2) var(--space-5);
      background: var(--booklet); color: var(--paper);
      font-size: var(--text-sm); font-weight: 600;
      border-radius: var(--radius-md); white-space: nowrap;
      transition: background-color 120ms ease, transform 80ms var(--ease-spring), opacity 120ms ease;
      outline: none;
    }
    .load-btn:hover:not(:disabled) { background: var(--booklet-bright); }
    .load-btn:active:not(:disabled) { transform: scale(0.96); }
    .load-btn:focus-visible { outline: 2px solid var(--booklet-bright); outline-offset: 2px; }
    .load-btn:disabled { background: var(--booklet-dim); opacity: 0.55; }

    /* Display toggles (the shared sheet styles the look; pages own the show/hide) */
    .grade-card { display: none; }
    .grade-card.visible { display: block; }
    .error-notice { display: none; }
    .error-notice.visible { display: block; }
    .grade-status { display: none; }
    .grade-status.visible { display: block; }

    .questions-loading {
      display: none; align-items: center; gap: var(--space-2);
      padding: var(--space-2) var(--space-3);
      font-family: var(--font-mono);
      font-size: var(--text-xs); color: var(--color-text-muted);
    }
    .questions-loading.visible { display: flex; }
    .questions-loading-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--color-text-faint); animation: dot-pulse 1.2s ease infinite; }
    .questions-loading-dot:nth-child(2) { animation-delay: 0.2s; }
    .questions-loading-dot:nth-child(3) { animation-delay: 0.4s; }

    .try-another-btn {
      padding: var(--space-2) var(--space-4);
      background: var(--ink-3);
      border: var(--border);
      border-radius: var(--radius-md);
      color: var(--paper);
      font-size: var(--text-sm); font-weight: 600;
      transition: background-color 120ms ease, border-color 120ms ease, transform 80ms var(--ease-spring);
      outline: none;
    }
    .try-another-btn:hover { background: var(--ink-4); border-color: var(--booklet); }
    .try-another-btn:active { transform: scale(0.97); }
    .try-another-btn:focus-visible { outline: 2px solid var(--booklet-bright); outline-offset: 2px; }

    @media (max-width: 560px) {
      .selector-row-top, .selector-row-bottom { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="page">
  <header class="topbar">
    <a href="/" class="topbar-back" aria-label="Back to welcome page">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
      Back
    </a>
    <div class="topbar-title">Quiz</div>
    <div class="topbar-right">
      <select class="hdr-subject-select" id="subjectSelect" aria-label="Subject"></select>
      <a href="/plan" class="topbar-link">Study →</a>
    </div>
  </header>

  <div class="selector-bar">
    <div class="mode-toggle" role="tablist" aria-label="Quiz mode">
      <button type="button" class="mode-pill active" id="modePastPaper" role="tab" aria-selected="true">Past Paper</button>
      <button type="button" class="mode-pill" id="modePractice" role="tab" aria-selected="false">Syllabus Practice</button>
    </div>
    <div class="selector-row selector-row-top">
      <!-- Subject lives in the header dropdown (sticky). Past Paper mode -->
      <div class="selector-field" id="paperField">
        <label class="selector-label" for="paperSelect">Paper</label>
        <select class="selector-select" id="paperSelect" aria-label="Select paper" disabled>
          <option value="">— paper —</option>
        </select>
      </div>
      <!-- Syllabus Practice mode -->
      <div class="selector-field" id="sectionField" style="display:none;">
        <label class="selector-label" for="sectionSelect">Section</label>
        <select class="selector-select" id="sectionSelect" aria-label="Select syllabus section" disabled>
          <option value="">— choose a subject first —</option>
        </select>
      </div>
    </div>
    <div class="selector-row selector-row-bottom" id="selectorRowBottom">
      <!-- Past Paper mode -->
      <div class="question-select-wrap" id="questionField">
        <label class="selector-label" for="questionSelect">Question</label>
        <div style="position:relative;">
          <select class="selector-select" id="questionSelect" aria-label="Select question" disabled>
            <option value="">— select subject and paper first —</option>
          </select>
          <div class="questions-loading" id="questionsLoading" aria-live="polite">
            <div class="questions-loading-dot"></div>
            <div class="questions-loading-dot"></div>
            <div class="questions-loading-dot"></div>
            Loading questions...
          </div>
        </div>
      </div>
      <!-- Syllabus Practice mode -->
      <div class="question-select-wrap" id="objectiveField" style="display:none;">
        <label class="selector-label" for="objectiveSelect">Objective</label>
        <select class="selector-select" id="objectiveSelect" aria-label="Select syllabus objective" disabled>
          <option value="">— select a section first —</option>
        </select>
      </div>
      <div style="padding-top:var(--space-5);align-self:flex-end;">
        <button type="button" class="load-btn" id="loadBtn" disabled>Load Question</button>
      </div>
    </div>
  </div>

  <div class="content-area">
    <div class="content-inner">
      <div id="questionSection">
        <div class="section-label">Question</div>
        <div class="question-card" id="questionCard">
          <div class="question-empty">
            <div class="question-empty-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/>
              </svg>
            </div>
            <div class="question-empty-title">No question loaded</div>
            <div class="question-empty-body">Select a subject, paper and question above, then click Load Question.</div>
          </div>
        </div>
      </div>

      <div class="answer-section" id="answerSection">
        <div class="section-label">Your Answer</div>
        <textarea class="answer-textarea" id="answerTextarea" rows="8"
          placeholder="Load a question first, then write your answer here using full sentences."
          disabled aria-label="Your answer"></textarea>
        <div class="submit-row">
          <span class="word-count" id="wordCount" aria-live="polite">0 words</span>
          <button type="button" class="submit-btn" id="submitBtn" disabled aria-label="Submit answer for grading">
            <span class="submit-btn-label">Submit Answer</span>
            <span class="submit-btn-dots" aria-hidden="true">
              <span class="submit-btn-dot"></span>
              <span class="submit-btn-dot"></span>
              <span class="submit-btn-dot"></span>
            </span>
          </button>
        </div>
        <div class="grade-status" id="gradeStatus" aria-live="polite">
          <div class="grade-status-msg" id="gradeStatusMsg"></div>
          <div class="grade-status-reassure" id="gradeStatusReassure" style="display:none;">Still working — long answers take a moment.</div>
        </div>
      </div>

      <div class="error-notice" id="errorNotice" role="alert"></div>

      <div id="gradeSection">
        <div class="section-label" id="gradeLabel" style="display:none;">Result</div>
        <div id="feedbackHost"></div>
      </div>
    </div>
  </div>
</div>

<script src="/static/feedback.js"></script>

<script>
  const API_BASE='http://127.0.0.1:8000';
  const state={mode:'pastpaper',subjectId:'',subjectDisplay:'',paper:'',
    questionId:null,questionStem:'',marksTotal:0,
    isLoading:false,isGrading:false,allQuestions:[],allSections:[]};

  const modePastPaper=document.getElementById('modePastPaper');
  const modePractice=document.getElementById('modePractice');
  const questionSection=document.getElementById('questionSection');
  const gradeSection=document.getElementById('gradeSection');
  const paperField=document.getElementById('paperField');
  const questionField=document.getElementById('questionField');
  const sectionField=document.getElementById('sectionField');
  const objectiveField=document.getElementById('objectiveField');
  const subjectSelect=document.getElementById('subjectSelect');
  const paperSelect=document.getElementById('paperSelect');
  const questionSelect=document.getElementById('questionSelect');
  const sectionSelect=document.getElementById('sectionSelect');
  const objectiveSelect=document.getElementById('objectiveSelect');
  const questionsLoading=document.getElementById('questionsLoading');
  const loadBtn=document.getElementById('loadBtn');
  const questionCard=document.getElementById('questionCard');
  const answerTextarea=document.getElementById('answerTextarea');
  const wordCount=document.getElementById('wordCount');
  const submitBtn=document.getElementById('submitBtn');
  const submitBtnLabel=submitBtn.querySelector('.submit-btn-label');
  const gradeStatus=document.getElementById('gradeStatus');
  const gradeStatusMsg=document.getElementById('gradeStatusMsg');
  const gradeStatusReassure=document.getElementById('gradeStatusReassure');
  const errorNotice=document.getElementById('errorNotice');
  const gradeLabel=document.getElementById('gradeLabel');
  const feedbackHost=document.getElementById('feedbackHost');

  function escapeHtml(str){if(!str)return'';const d=document.createElement('div');d.textContent=str;return d.innerHTML;}
  function countWords(t){return t.trim().split(/\s+/).filter(Boolean).length;}
  function updateWordCount(){const n=countWords(answerTextarea.value);wordCount.textContent=n===1?'1 word':`${n} words`;wordCount.className='word-count'+(n>0?' has-words':'');}
  function showError(msg){errorNotice.textContent=msg;errorNotice.classList.add('visible');}
  function hideError(){errorNotice.classList.remove('visible');}
  function updateLoadBtn(){
    if(state.mode==='practice'){
      loadBtn.disabled=!(state.subjectId&&objectiveSelect.value&&!state.isLoading);
    }else{
      loadBtn.disabled=!(state.subjectId&&state.paper&&questionSelect.value&&!state.isLoading);
    }
  }
  function updateSubmitBtn(){const w=countWords(answerTextarea.value);submitBtn.disabled=!(state.questionId&&w>=10&&!state.isGrading);}
  function setSubjectDisplay(d){state.subjectDisplay=d;}

  function resetFilters(){
    while(paperSelect.options.length>0)paperSelect.remove(0);
    const po=document.createElement('option');po.value='';po.textContent='— paper —';paperSelect.appendChild(po);
    paperSelect.disabled=true;
  }

  function populateFilters(papers){
    while(paperSelect.options.length>0)paperSelect.remove(0);
    if(papers.length===0){
      const po=document.createElement('option');po.value='';po.textContent='— no papers available —';paperSelect.appendChild(po);
      paperSelect.disabled=true;
      return;
    }
    const pPlaceholder=document.createElement('option');pPlaceholder.value='';pPlaceholder.textContent='— paper —';paperSelect.appendChild(pPlaceholder);
    // Each paper string is the full combined label ("Paper 2 - January 2026")
    // returned by /api/filters; it is both the value and the display text and
    // is sent verbatim as the `paper` param to /api/questions.
    papers.forEach(p=>{const o=document.createElement('option');o.value=p;o.textContent=p;paperSelect.appendChild(o);});
    paperSelect.disabled=false;
  }

  async function fetchFilters(subjectId){
    if(!subjectId){resetFilters();return;}
    try{
      const url=new URL(`${API_BASE}/api/filters`);
      url.searchParams.set('subject_id',subjectId);
      const res=await fetch(url.toString());
      if(!res.ok)throw new Error(`HTTP ${res.status}`);
      const data=await res.json();
      populateFilters(Array.isArray(data.papers)?data.papers:[]);
    }catch(e){populateFilters([]);}
  }

  async function fetchQuestions(subjectId,paper){
    if(!subjectId||!paper){state.allQuestions=[];populateQuestions();return;}
    questionsLoading.classList.add('visible');
    questionSelect.disabled=true;
    state.allQuestions=[];
    try{
      // The paper string already carries the year ("Paper 2 - January 2026"),
      // so it is the only filter sent -- no separate year param.
      const url=new URL(`${API_BASE}/api/questions`);
      url.searchParams.set('subject_id',subjectId);
      url.searchParams.set('paper',paper);
      const res=await fetch(url.toString());
      if(!res.ok)throw new Error(`HTTP ${res.status}`);
      const data=await res.json();
      state.allQuestions=Array.isArray(data)?data:[];
    }catch(e){state.allQuestions=[];}
    finally{questionsLoading.classList.remove('visible');}
    populateQuestions();
  }

  function populateQuestions(){
    while(questionSelect.options.length>1)questionSelect.remove(1);
    questionSelect.disabled=true;
    if(!state.paper){
      questionSelect.options[0].textContent=state.subjectId?'— select a paper —':'— select subject and paper first —';
      updateLoadBtn();return;
    }
    const list=state.allQuestions;
    if(list.length===0){
      questionSelect.options[0].textContent='— no questions found for this paper —';
      updateLoadBtn();return;
    }
    questionSelect.options[0].textContent=`— ${list.length} question${list.length!==1?'s':''} —`;
    list.forEach(q=>{
      const o=document.createElement('option');
      o.value=q.question_id;
      o.dataset.stem=q.stem??'';
      o.dataset.marks=q.marks_total??0;
      o.dataset.year=q.year??'';
      o.dataset.paper=q.paper??'';
      o.dataset.qnum=q.question_num??'';
      o.textContent=`${q.paper} · Q${q.question_num}${q.marks_total?` (${q.marks_total} marks)`:''}`;
      questionSelect.appendChild(o);
    });
    questionSelect.disabled=false;
    updateLoadBtn();
  }

  // --- Syllabus Practice mode ---------------------------------------------
  function resetSectionObjective(){
    while(sectionSelect.options.length>0)sectionSelect.remove(0);
    const so=document.createElement('option');so.value='';
    so.textContent='— choose a subject first —';sectionSelect.appendChild(so);
    sectionSelect.disabled=true;
    while(objectiveSelect.options.length>0)objectiveSelect.remove(0);
    const oo=document.createElement('option');oo.value='';
    oo.textContent='— select a section first —';objectiveSelect.appendChild(oo);
    objectiveSelect.disabled=true;
  }

  function populateSections(){
    while(sectionSelect.options.length>0)sectionSelect.remove(0);
    const ph=document.createElement('option');ph.value='';
    if(state.allSections.length===0){
      ph.textContent='— no sections available —';sectionSelect.appendChild(ph);
      sectionSelect.disabled=true;populateObjectives();return;
    }
    ph.textContent='— section —';sectionSelect.appendChild(ph);
    state.allSections.forEach((s,i)=>{
      const o=document.createElement('option');o.value=String(i);
      o.textContent=`${s.section_num?s.section_num+'. ':''}${s.title}`;
      sectionSelect.appendChild(o);
    });
    sectionSelect.disabled=false;
    populateObjectives();
  }

  function populateObjectives(){
    while(objectiveSelect.options.length>0)objectiveSelect.remove(0);
    const ph=document.createElement('option');ph.value='';
    const idx=sectionSelect.value;
    if(idx===''||!state.allSections[idx]){
      ph.textContent='— select a section first —';objectiveSelect.appendChild(ph);
      objectiveSelect.disabled=true;updateLoadBtn();return;
    }
    const objs=state.allSections[idx].objectives||[];
    if(objs.length===0){
      ph.textContent='— no objectives in this section —';objectiveSelect.appendChild(ph);
      objectiveSelect.disabled=true;updateLoadBtn();return;
    }
    ph.textContent=`— ${objs.length} objective${objs.length!==1?'s':''} —`;objectiveSelect.appendChild(ph);
    objs.forEach(o=>{
      const opt=document.createElement('option');opt.value=o.objective_id;
      const stmt=o.content_stmt||'';
      const short=stmt.length>72?stmt.slice(0,72)+'…':stmt;
      opt.textContent=`${o.objective_num} — ${short}`;
      objectiveSelect.appendChild(opt);
    });
    objectiveSelect.disabled=false;
    updateLoadBtn();
  }

  async function fetchSections(subjectId){
    state.allSections=[];
    if(!subjectId){resetSectionObjective();return;}
    try{
      const url=new URL(`${API_BASE}/api/sections`);
      url.searchParams.set('subject_id',subjectId);
      const res=await fetch(url.toString());
      if(!res.ok)throw new Error(`HTTP ${res.status}`);
      const data=await res.json();
      state.allSections=Array.isArray(data)?data:[];
    }catch(e){state.allSections=[];}
    populateSections();
  }

  async function loadPracticeQuestion(){
    const objId=objectiveSelect.value;
    if(!state.subjectId||!objId)return;
    state.isLoading=true;updateLoadBtn();
    const prevLabel=loadBtn.textContent;loadBtn.textContent='Generating…';
    hideError();hideGrade();
    try{
      const res=await fetch(`${API_BASE}/api/chat`,{method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({message:'(practice)',subject_id:state.subjectId,route:'practice',objective_id:objId})});
      if(!res.ok){const e=await res.text().catch(()=>'');showError(`Couldn't generate a question (${res.status}). ${e||'Is the FastAPI server running?'}`);return;}
      const data=await res.json();
      if(data.error==='out_of_scope'){showError('That objective is out of scope.');return;}
      if(data.error){showError(`Error: ${data.error}`);return;}
      showQuestion({questionId:data.question_id,stem:data.stem||'',
        paper:data.paper||'Syllabus Practice',qnum:data.question_num||'Practice',
        marks:data.marks_total||0});
    }catch(err){
      if(err instanceof TypeError&&err.message.includes('fetch')){
        showError("Couldn't reach the study system. Make sure Ollama and FastAPI are running.");
      }else{showError(`Something went wrong: ${err.message}`);}
    }finally{state.isLoading=false;loadBtn.textContent=prevLabel;updateLoadBtn();}
  }

  function setMode(mode){
    if(state.mode===mode)return;
    state.mode=mode;
    const practice=mode==='practice';
    modePastPaper.classList.toggle('active',mode==='pastpaper');
    modePractice.classList.toggle('active',practice);
    modePastPaper.setAttribute('aria-selected',String(mode==='pastpaper'));
    modePractice.setAttribute('aria-selected',String(practice));
    // Past Paper and Syllabus Practice share the selector rows.
    paperField.style.display=practice?'none':'';
    questionField.style.display=practice?'none':'';
    sectionField.style.display=practice?'':'none';
    objectiveField.style.display=practice?'':'none';
    resetQuestionCard();hideGrade();hideError();
    if(practice){
      if(state.subjectId)fetchSections(state.subjectId);else resetSectionObjective();
    }else{
      if(state.subjectId)fetchFilters(state.subjectId);
    }
    updateLoadBtn();
  }

  function showQuestion({questionId,stem,paper,qnum,marks}){
    state.questionId=questionId;
    state.questionStem=stem||'';
    state.marksTotal=marks||0;
    // Past-paper qnums start with a digit ("1(a)") so prefix "Q"; the practice
    // label ("Practice") is shown as-is.
    const qLabel=/^\d/.test(String(qnum||''))?`Q${qnum}`:String(qnum||'');
    questionCard.innerHTML=`
      <div class="question-card-header">
        <div class="question-card-meta">
          <span class="question-meta-tag paper">${escapeHtml(paper)}</span>
          ${qLabel?`<span class="question-meta-tag qnum">${escapeHtml(qLabel)}</span>`:''}
        </div>
        ${state.marksTotal?`<span class="marks-badge">${state.marksTotal} mark${state.marksTotal!==1?'s':''}</span>`:''}
      </div>
      <div class="question-stem">${escapeHtml(state.questionStem)}</div>`;
    questionCard.style.animation='none';
    requestAnimationFrame(()=>{questionCard.style.animation='';});
    answerTextarea.disabled=false;
    answerTextarea.placeholder='Write your answer here. Use full sentences and address every part of the question.';
    answerTextarea.focus();
    hideGrade();hideError();updateSubmitBtn();
  }

  function renderQuestionCard(opt){
    showQuestion({questionId:opt.value,stem:opt.dataset.stem||'',
      paper:opt.dataset.paper,qnum:opt.dataset.qnum,
      marks:parseInt(opt.dataset.marks,10)||0});
  }

  function resetQuestionCard(){
    state.questionId=null;state.questionStem='';state.marksTotal=0;
    questionCard.innerHTML=`
      <div class="question-empty">
        <div class="question-empty-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/>
          </svg>
        </div>
        <div class="question-empty-title">No question loaded</div>
        <div class="question-empty-body">Select a subject, paper and question above, then click Load Question.</div>
      </div>`;
    answerTextarea.disabled=true;answerTextarea.value='';
    answerTextarea.placeholder='Load a question first, then write your answer here using full sentences.';
    updateWordCount();updateSubmitBtn();
  }

  // Render grading feedback with the SHARED missed-points component (feedback.js),
  // identical to Study. "Try another question" is the forward action.
  function renderGrade(data){
    gradeLabel.style.display='block';
    window.renderMissedFeedback(feedbackHost,data,{onNext:tryAnother,nextLabel:'Try another question'});
    feedbackHost.scrollIntoView({behavior:'auto',block:'nearest'});
  }

  function hideGrade(){gradeLabel.style.display='none';feedbackHost.innerHTML='';}

  // Perceived-latency polish: while the backend grades, cycle a calm status
  // line every 3s and, past 30s, append a reassurance. Plain text only.
  const GRADE_STATUS_MESSAGES=[
    'Reading your answer...',
    'Checking against mark scheme...',
    'Identifying which points you covered...',
    'Computing score...'];
  let gradeStatusInterval=null,gradeStatusTimeout=null;

  function startGradeStatus(){
    let i=0;
    gradeStatusMsg.textContent=GRADE_STATUS_MESSAGES[0];
    gradeStatusReassure.style.display='none';
    gradeStatus.classList.add('visible');
    gradeStatusInterval=setInterval(()=>{
      i=(i+1)%GRADE_STATUS_MESSAGES.length;
      gradeStatusMsg.textContent=GRADE_STATUS_MESSAGES[i];
    },3000);
    gradeStatusTimeout=setTimeout(()=>{gradeStatusReassure.style.display='block';},30000);
  }

  function stopGradeStatus(){
    if(gradeStatusInterval){clearInterval(gradeStatusInterval);gradeStatusInterval=null;}
    if(gradeStatusTimeout){clearTimeout(gradeStatusTimeout);gradeStatusTimeout=null;}
    gradeStatus.classList.remove('visible');
    gradeStatusMsg.textContent='';
    gradeStatusReassure.style.display='none';
  }

  async function submitAnswer(){
    if(!state.questionId)return;
    const text=answerTextarea.value.trim();
    if(countWords(text)<10)return;
    state.isGrading=true;submitBtn.disabled=true;submitBtnLabel.textContent='Grading…';
    hideError();startGradeStatus();
    try{
      const res=await fetch(`${API_BASE}/api/chat`,{method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({message:text,subject_id:state.subjectId,route:'grade',question_id:state.questionId})});
      if(!res.ok){const e=await res.text().catch(()=>'');showError(`Grading failed (${res.status}). ${e||'Check that the FastAPI server is running.'}`);return;}
      const data=await res.json();
      if(data.error==='no_mark_scheme'){showError('No mark scheme found for this question. Try a different question.');return;}
      if(data.error==='out_of_scope'){showError('This question could not be matched to a syllabus objective. Try a different question.');return;}
      if(data.error){showError(`Error: ${data.error}`);return;}
      renderGrade(data);
    }catch(err){
      if(err instanceof TypeError&&err.message.includes('fetch')){
        showError("Couldn't reach the study system. Make sure Ollama and FastAPI are running.");
      }else{showError(`Something went wrong: ${err.message}`);}
    }finally{state.isGrading=false;stopGradeStatus();submitBtnLabel.textContent='Submit Answer';updateSubmitBtn();}
  }

  function tryAnother(){answerTextarea.value='';updateWordCount();hideGrade();hideError();updateSubmitBtn();answerTextarea.focus();document.querySelector('.content-area').scrollTop=0;}

  // Populate the header subject dropdown and honour the sticky subject
  // (/api/state/subject), same as Study. Loads that subject's filters on init.
  async function fetchSubjects(){
    let subjects=[];
    try{const res=await fetch(`${API_BASE}/api/subjects`);if(res.ok)subjects=await res.json();}catch{}
    if(!Array.isArray(subjects))subjects=[];
    subjectSelect.innerHTML='';
    subjects.forEach(s=>{const o=document.createElement('option');o.value=s.subject_id;o.textContent=s.display_name;subjectSelect.appendChild(o);});
    let current=null;
    try{const r=await fetch(`${API_BASE}/api/state/subject`);if(r.ok)current=(await r.json()).subject_id;}catch{}
    if(!current&&subjects.length)current=subjects[0].subject_id;
    if(current){
      subjectSelect.value=current;
      const opt=subjectSelect.options[subjectSelect.selectedIndex];
      state.subjectId=current;setSubjectDisplay(opt?opt.textContent.trim():current);
      if(state.mode==='practice')fetchSections(current);else fetchFilters(current);
      updateLoadBtn();
    }
  }

  modePastPaper.addEventListener('click',()=>setMode('pastpaper'));
  modePractice.addEventListener('click',()=>setMode('practice'));

  subjectSelect.addEventListener('change',()=>{
    const opt=subjectSelect.options[subjectSelect.selectedIndex];
    state.subjectId=opt.value;
    setSubjectDisplay(opt.value?opt.textContent.trim():'');
    // Persist the sticky subject so Study/Welcome reflect it too.
    if(state.subjectId){fetch(`${API_BASE}/api/state/subject`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({subject_id:state.subjectId})}).catch(()=>{});}
    state.paper='';
    resetQuestionCard();hideError();
    while(questionSelect.options.length>1)questionSelect.remove(1);
    questionSelect.options[0].textContent='— select a paper —';
    questionSelect.disabled=true;
    if(state.mode==='practice'){
      if(state.subjectId){fetchSections(state.subjectId);}else{resetSectionObjective();}
    }else{
      if(state.subjectId){fetchFilters(state.subjectId);}else{resetFilters();}
    }
    updateLoadBtn();
  });
  paperSelect.addEventListener('change',()=>{state.paper=paperSelect.value;state.questionId=null;fetchQuestions(state.subjectId,state.paper);});
  questionSelect.addEventListener('change',()=>{updateLoadBtn();});
  sectionSelect.addEventListener('change',()=>{populateObjectives();});
  objectiveSelect.addEventListener('change',()=>{updateLoadBtn();});
  loadBtn.addEventListener('click',()=>{
    if(state.mode==='practice'){loadPracticeQuestion();return;}
    const opt=questionSelect.options[questionSelect.selectedIndex];if(!opt||!opt.value)return;renderQuestionCard(opt);
  });
  answerTextarea.addEventListener('input',()=>{updateWordCount();updateSubmitBtn();});
  submitBtn.addEventListener('click',submitAnswer);
  answerTextarea.addEventListener('keydown',(e)=>{if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){e.preventDefault();if(!submitBtn.disabled)submitAnswer();}});

  function init(){resetFilters();fetchSubjects();updateLoadBtn();updateSubmitBtn();updateWordCount();}
  init();
</script>
<div class="footer-note">Done for the day? Close this tab, then wait a few seconds before unplugging the SSD.</div>
</body>
</html>
