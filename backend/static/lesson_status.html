<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSEC Study Partner · Lesson Status</title>
  <link rel="stylesheet" href="/static/shared.css" />
  <style>
    body {
      min-height: 100%;
      background: var(--bg-page);
      color: var(--text-body);
    }
    .wrap {
      max-width: 640px;
      margin: 0 auto;
      padding: var(--space-6, 32px) var(--space-5, 24px);
    }

    /* ---- Header ---- */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-6, 32px);
    }
    .title {
      font-size: var(--text-xl, 1.375rem);
      font-weight: 700;
      color: var(--text-body);
      margin: 0;
      letter-spacing: -0.01em;
    }
    .title .subj { color: var(--accent-blue); }
    .back-link {
      font-size: var(--text-sm, 0.875rem);
      color: var(--text-muted);
      text-decoration: none;
      transition: color 120ms ease;
    }
    .back-link:hover { color: var(--text-body); }

    /* ---- Cards ---- */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: var(--radius-lg, 14px);
      padding: var(--space-5, 24px);
      margin-bottom: var(--space-4, 16px);
    }

    /* ---- Stat line (Lessons written X of Y) ---- */
    .stat-line {
      font-size: var(--text-base, 1rem);
      color: var(--text-secondary);
      margin-bottom: var(--space-2, 8px);
    }
    .stat-line .num {
      font-family: var(--font-mono, monospace);
      font-weight: 700;
      color: var(--text-body);
    }

    /* ---- Progress bar ---- */
    .bar-track {
      height: 10px;
      background: var(--border-subtle);
      border-radius: var(--radius-pill, 999px);
      overflow: hidden;
      margin: var(--space-2, 8px) 0;
    }
    .bar-fill {
      height: 100%;
      background: var(--accent-green);
      border-radius: var(--radius-pill, 999px);
      transition: width 400ms ease;
    }
    .bar-pct {
      font-family: var(--font-mono, monospace);
      font-size: var(--text-sm, 0.875rem);
      color: var(--text-muted);
    }

    /* ---- Key/value rows ---- */
    .row {
      display: flex;
      justify-content: space-between;
      gap: var(--space-3, 12px);
      font-size: var(--text-sm, 0.875rem);
      color: var(--text-secondary);
      padding: 3px 0;
    }
    .row .num {
      font-family: var(--font-mono, monospace);
      color: var(--text-body);
      font-weight: 700;
    }

    /* ---- Section label ---- */
    .section-label {
      font-size: var(--text-xs, 0.75rem);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin: 0 0 var(--space-2, 8px);
      font-weight: 600;
    }
    .breakdown .row { padding-left: var(--space-3, 12px); }

    /* ---- Activity log ---- */
    .activity { list-style: none; margin: 0; padding: 0; }
    .activity li {
      display: grid;
      grid-template-columns: 52px 1fr auto;
      gap: var(--space-3, 12px);
      align-items: baseline;
      font-family: var(--font-mono, monospace);
      font-size: var(--text-xs, 0.75rem);
      color: var(--text-secondary);
      padding: 4px 0;
      border-bottom: 1px solid var(--border-subtle);
    }
    .activity li:last-child { border-bottom: none; }
    .activity .ts  { color: var(--text-muted); }
    .activity .oid { color: var(--accent-blue); font-weight: 700; }

    /* ---- Event type badges ---- */
    .ev { font-size: var(--text-xs, 0.75rem); }
    .ev.lesson_written { color: var(--accent-green); }
    .ev.queued         { color: #f5b450; }
    .ev.staled         { color: var(--accent-red); }

    /* ---- Footer pulse ---- */
    .meta {
      font-size: var(--text-xs, 0.75rem);
      color: var(--text-muted);
      text-align: center;
      margin-top: var(--space-4, 16px);
    }
    .meta .dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent-green);
      margin-right: 6px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.25; } }
    @media (prefers-reduced-motion: reduce) {
      .meta .dot  { animation: none; }
      .bar-fill   { transition: none; }
    }

    /* ---- Empty / error states ---- */
    .empty { color: var(--text-muted); font-size: var(--text-sm, 0.875rem); }
    .err   { color: var(--accent-red);  font-size: var(--text-sm, 0.875rem); }
  </style>
</head>
<body>
  <div class="wrap">

    <div class="topbar">
      <h1 class="title">Lesson Status — <span class="subj" id="subjName">…</span></h1>
      <a href="/" class="back-link">&#x2190; Home</a>
    </div>

    <!-- Progress card -->
    <div class="card">
      <div class="stat-line">
        Lessons written: <span class="num" id="written">–</span>
        of <span class="num" id="total">–</span>
      </div>
      <div class="bar-track"><div class="bar-fill" id="bar" style="width:0%"></div></div>
      <div class="bar-pct" id="pct">–</div>
    </div>

    <!-- Queue summary card -->
    <div class="card">
      <div class="row"><span>Stale (regenerating?)</span><span class="num" id="stale">–</span></div>
      <div class="row"><span>Queued</span>              <span class="num" id="queued">–</span></div>
    </div>

    <!-- Queue breakdown card -->
    <div class="card">
      <div class="section-label">Queue breakdown</div>
      <div class="breakdown" id="breakdown"><div class="empty">…</div></div>
    </div>

    <!-- Recent activity card -->
    <div class="card">
      <div class="section-label">Recent activity (last 10)</div>
      <ul class="activity" id="activity"><li class="empty">…</li></ul>
    </div>

    <div class="meta">
      <span class="dot"></span>
      <span id="metaText">Auto-refreshes every 5 seconds.</span>
    </div>

  </div>

<script>
"use strict";
// Resolve the subject in priority order: ?subject= URL param -> last subject the
// chat page recorded -> the server-side sticky subject (always a valid locked
// subject). The server fallback is what makes the builder's "Lesson Status" link
// work without first opening /chat (which is the only page that sets last_subject).
let SUBJECT = new URLSearchParams(location.search).get("subject") || localStorage.getItem('last_subject') || "";
const REFRESH_MS = 5000;

async function resolveSubject() {
  if (SUBJECT) return;
  try {
    const res = await fetch("/api/state/subject");
    const data = await res.json();
    if (data && data.subject_id) SUBJECT = data.subject_id;
  } catch (e) { /* leave SUBJECT empty -> refresh() shows the guidance message */ }
}

function esc(s) {
  const d = document.createElement("div");
  d.textContent = s == null ? "" : String(s);
  return d.innerHTML;
}
function hhmm(ts) {
  if (!ts) return "—";
  const m = String(ts).match(/(\d{2}):(\d{2})/);
  return m ? m[1] + ":" + m[2] : esc(ts);
}
const EVENT_LABEL = { lesson_written: "lesson_written", queued: "queued", staled: "staled" };

async function refresh() {
  if (!SUBJECT) {
    document.getElementById("metaText").textContent = "No subject selected. Open a lesson first.";
    return;
  }
  let data;
  try {
    const res = await fetch("/api/lessons/status/" + encodeURIComponent(SUBJECT));
    data = await res.json();
  } catch (e) {
    document.getElementById("metaText").innerHTML =
      '<span class="err">Couldn\'t reach the server. Retrying…</span>';
    return;
  }
  document.getElementById("metaText").textContent = "Auto-refreshes every 5 seconds.";

  document.getElementById("subjName").textContent =
    (data.subject_id || SUBJECT).replace(/_/g, " ");

  const written = data.lessons_written || 0;
  const total   = data.total_objectives || 0;
  const pct     = total ? Math.round(100 * written / total) : 0;
  document.getElementById("written").textContent = written;
  document.getElementById("total").textContent   = total;
  document.getElementById("bar").style.width     = pct + "%";
  document.getElementById("pct").textContent     = pct + "%";
  document.getElementById("stale").textContent   = data.lessons_stale  || 0;
  document.getElementById("queued").textContent  = data.lessons_queued || 0;

  const bd   = data.queue_by_reason || {};
  const keys = Object.keys(bd).sort((a, b) => bd[b] - bd[a]);
  document.getElementById("breakdown").innerHTML = keys.length
    ? keys.map(k =>
        '<div class="row"><span>' + esc(k) + '</span>' +
        '<span class="num">' + bd[k] + '</span></div>'
      ).join("")
    : '<div class="empty">Queue is empty.</div>';

  const acts = Array.isArray(data.recent_activity) ? data.recent_activity : [];
  document.getElementById("activity").innerHTML = acts.length
    ? acts.map(a => {
        const ev     = EVENT_LABEL[a.event] || a.event || "";
        const reason = a.reason ? " (" + esc(a.reason) + ")" : "";
        return "<li>" +
          '<span class="ts">'  + hhmm(a.timestamp)        + "</span>" +
          '<span class="oid">' + esc(a.objective_id)       + "</span>" +
          '<span class="ev '   + esc(a.event) + '">← ' + esc(ev) + reason + "</span>" +
          "</li>";
      }).join("")
    : '<li class="empty">No activity yet.</li>';
}

resolveSubject().then(() => { refresh(); setInterval(refresh, REFRESH_MS); });
</script>
<div class="footer-note">Done for the day? Close this tab, then wait a few seconds before unplugging the SSD.</div>
</body>
</html>
